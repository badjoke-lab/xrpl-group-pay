name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NETWORK: testnet
  NEXT_PUBLIC_APP_NETWORK: testnet
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  ALLOW_MAINNET_BUILD: "false"
  STORYBOOK_DISABLE_TELEMETRY: "1"

jobs:
  quality:
    name: Quality and runtime compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate environment boundary
        run: pnpm check:env

      - name: Lint
        run: pnpm lint

      - name: Type-check
        id: typecheck
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log

      - name: Upload type-check diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 1

      - name: Run unit and component tests
        id: tests
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee tests.log

      - name: Upload test diagnostics
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: tests.log
          retention-days: 1

      - name: Build Next.js application
        run: pnpm build

      - name: Start Storybook smoke test
        timeout-minutes: 3
        run: pnpm storybook:smoke

      - name: Build Cloudflare Worker output
        timeout-minutes: 10
        run: pnpm build:worker

  e2e:
    name: Browser smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: pnpm test:e2e
