name: Fix PR5 retryable verification state

on:
  push:
    branches:
      - feat/pr-005-validated-ledger-verification
    paths:
      - .github/workflows/fix-pr5-retryable-verification.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/pr-005-validated-ledger-verification
          fetch-depth: 0

      - name: Separate retryable verification errors
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/payment/testnet-payment-form.tsx')
          text = path.read_text()
          old = '''      } catch (error) {
        setState({
          kind: "verificationFailed",
          payload,
          txid: transactionId,
'''
          new = '''      } catch (error) {
        setState({
          kind: "verificationPending",
          payload,
          txid: transactionId,
'''
          if text.count(old) != 1:
              raise SystemExit('verification catch marker not found exactly once')
          text = text.replace(old, new, 1)
          old_heading = '              Waiting for validated ledger'
          new_heading = '              Verification not complete'
          if text.count(old_heading) != 1:
              raise SystemExit('pending heading marker not found exactly once')
          text = text.replace(old_heading, new_heading, 1)
          path.write_text(text)
          PY
          rm .github/workflows/fix-pr5-retryable-verification.yml

      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/payment/testnet-payment-form.tsx .github/workflows/fix-pr5-retryable-verification.yml
          git commit -m 'fix: keep verification infrastructure errors retryable'
          git push origin HEAD:feat/pr-005-validated-ledger-verification
