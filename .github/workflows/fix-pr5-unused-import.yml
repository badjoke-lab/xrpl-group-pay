name: Fix PR5 unused import

on:
  push:
    branches:
      - feat/pr-005-validated-ledger-verification
    paths:
      - .github/workflows/fix-pr5-unused-import.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/pr-005-validated-ledger-verification
          fetch-depth: 0

      - name: Remove unused icon import
        run: |
          sed -i '/^  CheckCircle2,$/d' src/components/payment/testnet-payment-form.tsx
          rm .github/workflows/fix-pr5-unused-import.yml

      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/payment/testnet-payment-form.tsx .github/workflows/fix-pr5-unused-import.yml
          git commit -m 'fix: remove unused verification icon import'
          git push origin HEAD:feat/pr-005-validated-ledger-verification
