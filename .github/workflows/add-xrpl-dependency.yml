name: Add xrpl dependency

on:
  push:
    branches:
      - feat/pr-004-xaman-testnet-payment
    paths:
      - .github/workflows/add-xrpl-dependency.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/pr-004-xaman-testnet-payment
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Add xrpl dependency
        run: pnpm add --save-exact xrpl@5.0.0

      - name: Remove bootstrap workflow
        run: rm .github/workflows/add-xrpl-dependency.yml

      - name: Commit dependency update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json pnpm-lock.yaml .github/workflows/add-xrpl-dependency.yml
          git commit -m 'chore: add xrpl dependency'
          git push origin HEAD:feat/pr-004-xaman-testnet-payment
